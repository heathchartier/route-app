<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2237"/>
      <stop offset="100%" stop-color="#061018"/>
    </linearGradient>
    <linearGradient id="teal-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5b8"/>
      <stop offset="100%" stop-color="#00bfa5"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Teal glow ring (subtle) -->
  <circle cx="256" cy="230" r="175" fill="none" stroke="#00e5b8" stroke-width="2" stroke-opacity="0.1"/>

  <!-- Route dots (top decoration) -->
  <circle cx="130" cy="105" r="14" fill="#00e5b8" opacity="0.7" filter="url(#glow)"/>
  <circle cx="130" cy="105" r="7" fill="#fff" opacity="0.9"/>

  <circle cx="256" cy="78" r="10" fill="#00e5b8" opacity="0.5"/>
  <circle cx="382" cy="105" r="14" fill="#00e5b8" opacity="0.7" filter="url(#glow)"/>
  <circle cx="382" cy="105" r="7" fill="#fff" opacity="0.9"/>

  <!-- Route line connecting dots -->
  <path d="M 130 105 Q 190 75 256 78 Q 322 81 382 105"
        stroke="url(#teal-grad)" stroke-width="5" fill="none"
        stroke-linecap="round" opacity="0.6"/>

  <!-- "Field" label (white, above IQ) -->
  <text x="256" y="258"
        text-anchor="middle"
        font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="86"
        font-weight="700"
        letter-spacing="1"
        fill="#ffffff"
        opacity="0.88">Field</text>

  <!-- "IQ" main text (teal gradient) -->
  <text x="256" y="392"
        text-anchor="middle"
        font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="190"
        font-weight="800"
        letter-spacing="-8"
        fill="url(#teal-grad)">IQ</text>

  <!-- Teal underline accent -->
  <rect x="162" y="412" width="188" height="10" rx="5" fill="url(#teal-grad)" opacity="0.9"/>
</svg>
